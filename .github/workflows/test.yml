---
on:
  pull_request:
    branches: [ master ]

jobs:
  test-formula:
    runs-on: 	macos-latest
    strategy:
      fail-fast: false
      matrix:
        formulae:
          [
            bbl,
            bbr,
            cf-cli,
            cf-cli@7,
            cf-cli@8,
            credhub-cli,
            uaa-cli,
          ]
    steps:
      - uses: actions/checkout@v3
      - run: brew install --formula cloudfoundry/tap/${{ matrix.formulae }}

  test-cask:
    runs-on: 	macos-latest
    strategy:
      fail-fast: false
      matrix:
        cask:
          [
            uaa-cli
          ]
    steps:
      - uses: actions/checkout@v3
      - run: brew install --cask cloudfoundry/tap/${{ matrix.cask }}
